name: CI

on:
  push:
    branches: [main, ottimizzazione]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Build/typecheck do not need real DB credentials but Prisma needs SOMETHING.
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
  # 32-byte base64 placeholder used only by code paths that import the helper.
  ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  NEXTAUTH_SECRET: ci-only-not-a-real-secret-do-not-reuse
  NEXTAUTH_URL: http://localhost:9002

jobs:
  security:
    name: Dependency security scan (NIS2 Art. 21(2)d)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --prefer-offline --no-fund

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high

      - name: Generate SBOM (CycloneDX)
        run: npm run sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 30

      - name: SAST - Security pattern scan
        run: |
          echo "=== SAST Security Scan ==="
          ISSUES=0
          # Check for eval() usage
          EVAL_COUNT=$(grep -r "eval(" src/ --include="*.ts" --include="*.tsx" -l 2>/dev/null | wc -l)
          if [ "$EVAL_COUNT" -gt 0 ]; then
            echo "::warning::Found eval() usage in $EVAL_COUNT files"
            grep -r "eval(" src/ --include="*.ts" --include="*.tsx" -l
            ISSUES=$((ISSUES + 1))
          fi
          # Check for dangerouslySetInnerHTML
          INNER_COUNT=$(grep -r "dangerouslySetInnerHTML" src/ --include="*.tsx" -l 2>/dev/null | wc -l)
          if [ "$INNER_COUNT" -gt 0 ]; then
            echo "::warning::Found dangerouslySetInnerHTML in $INNER_COUNT files"
            ISSUES=$((ISSUES + 1))
          fi
          # Check for hardcoded secrets patterns
          SECRET_COUNT=$(grep -rE "(password|secret|apikey|api_key)\s*[:=]\s*['\"][^'\"]{8,}" src/ --include="*.ts" --include="*.tsx" -il 2>/dev/null | wc -l)
          if [ "$SECRET_COUNT" -gt 0 ]; then
            echo "::error::Possible hardcoded secrets in $SECRET_COUNT files"
            ISSUES=$((ISSUES + 1))
          fi
          # Check for $queryRawUnsafe
          RAW_COUNT=$(grep -r "queryRawUnsafe\|queryRaw\b" src/ --include="*.ts" -l 2>/dev/null | wc -l)
          if [ "$RAW_COUNT" -gt 0 ]; then
            echo "::warning::Found raw SQL queries in $RAW_COUNT files"
            ISSUES=$((ISSUES + 1))
          fi
          echo "SAST scan complete: $ISSUES issue categories found"

      - name: Check lock file for known CVEs
        run: |
          echo "=== Lock File CVE Check ==="
          npm audit --json > audit-report.json 2>/dev/null || true
          CRITICAL=$(node -e "import{readFile}from'fs/promises';const r=JSON.parse(await readFile('audit-report.json','utf8'));console.log(r.metadata?.vulnerabilities?.critical??0)" --input-type=module)
          HIGH=$(node -e "import{readFile}from'fs/promises';const r=JSON.parse(await readFile('audit-report.json','utf8'));console.log(r.metadata?.vulnerabilities?.high??0)" --input-type=module)
          echo "Critical: $CRITICAL | High: $HIGH"
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical and $HIGH high vulnerabilities in lock file"
            exit 1
          fi

  quality:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true # ESLint currently soft-failing per next.config.ts

      - name: Tests
        run: npm test

  build:
    name: Next build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Bundle size check
        run: |
          echo "=== Bundle Size Check ==="
          du -sh .next/static/chunks/ 2>/dev/null || true
          du -sh .next/server/ 2>/dev/null || true
          TOTAL=$(find .next/static -name '*.js' -exec cat {} + 2>/dev/null | wc -c)
          echo "Total JS bundle: $((TOTAL / 1024))KB"
          if [ "$TOTAL" -gt 5242880 ]; then
            echo "::warning::JS bundle exceeds 5MB budget ($((TOTAL / 1024))KB)"
          fi
