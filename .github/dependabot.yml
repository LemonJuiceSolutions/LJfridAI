version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 10
    groups:
      security-and-patches:
        update-types:
          - patch
          - minor

  - package-ecosystem: npm
    directory: /scheduler-service
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Rome
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /python-backend
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Rome
    open-pull-requests-limit: 5
