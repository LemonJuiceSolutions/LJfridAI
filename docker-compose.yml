services:
  # ============================================================================
  # Next.js Development Server
  # ============================================================================
  app:
    container_name: rulesage-app
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "9002:9002"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/rulesagedb
      - NEXTAUTH_URL=http://localhost:9002
      - PYTHON_BACKEND_URL=http://python-backend:5005
      - DATA_LAKE_PATH=/data_lake
      # Shared secret that Next.js sends as X-Internal-Token on every
      # Python backend call. MUST equal python-backend's PYTHON_BACKEND_TOKEN.
      # Set in .env; dev fallback handled in-code for localhost-only.
      - PYTHON_BACKEND_TOKEN=${PYTHON_BACKEND_TOKEN:-}
      # These will be loaded from .env file via env_file directive
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      python-backend:
        condition: service_healthy
    volumes:
      # Mount source code for hot reloading
      - ./src:/app/src:delegated
      - ./scripts:/app/scripts:delegated
      - ./public:/app/public:delegated
      - ./prisma:/app/prisma:delegated
      # Mount config files that might change
      - ./next.config.ts:/app/next.config.ts:ro
      - ./tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./postcss.config.mjs:/app/postcss.config.mjs:ro
      - ./components.json:/app/components.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      # Preserve node_modules from container (don't sync with host)
      - app_node_modules:/app/node_modules
      # Preserve .next build cache
      - app_next_cache:/app/.next
      # Shared data lake (also accessible by python-backend)
      - ./data_lake:/data_lake:delegated
      # Preview cache DuckDB file + legacy .json.gz files (shared with scheduler)
      - preview_cache_data:/app/data/preview-cache
    networks:
      - app-network
    # healthcheck:
    #   test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9002/api/health"]
    #   interval: 30s
    #   timeout: 10s
    #   start_period: 60s
    #   retries: 3

  # ============================================================================
  # Python Flask Backend
  # ============================================================================
  python-backend:
    container_name: rulesage-python
    build:
      context: .
      dockerfile: Dockerfile.python
    restart: unless-stopped
    ports:
      - "5005:5005"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
      - DATA_LAKE_PATH=/data_lake
      # Gunicorn settings (override Dockerfile defaults via env)
      - GUNICORN_WORKERS=4
      - GUNICORN_TIMEOUT=600
      # Bind to all interfaces inside the isolated Docker network so the
      # `app` service can reach `http://python-backend:5005`. Outside Docker,
      # app.py defaults to 127.0.0.1 for safety (see python-backend/app.py).
      - PYTHON_BACKEND_HOST=0.0.0.0
      # Internal auth: must match the value sent by Next.js as X-Internal-Token.
      # Required in production; dev falls back to a known local-only token.
      - PYTHON_BACKEND_TOKEN=${PYTHON_BACKEND_TOKEN:-}
    # In dev: use Flask dev server with hot reload instead of Gunicorn
    # Uncomment the next line for development:
    # command: ["python", "app.py"]
    volumes:
      # Mount entire python-backend directory for hot reloading
      - ./python-backend:/app:delegated
      # Shared data lake (also accessible by Next.js app)
      - ./data_lake:/data_lake:delegated
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  db:
    container_name: rulesage-db
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rulesagedb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rulesagedb"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ============================================================================
  # Scheduler Service (optional — activate with: docker-compose --profile scheduler up)
  # When active, Next.js skips in-process scheduler init and proxies commands here.
  # Set SCHEDULER_SERVICE_URL=http://scheduler:3001 and SCHEDULER_SERVICE_SECRET in .env
  # ============================================================================
  scheduler:
    container_name: rulesage-scheduler
    profiles: ["scheduler"]
    build:
      context: .
      dockerfile: scheduler-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/rulesagedb
      - PYTHON_BACKEND_URL=http://python-backend:5005
      - SCHEDULER_PORT=3001
      - DATA_LAKE_PATH=/data_lake
      # Same internal token as the `app` service — scheduler reuses the
      # pythonFetch helper from src/lib/python-backend.ts.
      - PYTHON_BACKEND_TOKEN=${PYTHON_BACKEND_TOKEN:-}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      python-backend:
        condition: service_healthy
    volumes:
      - ./data_lake:/data_lake:delegated
      # Must mount the same preview-cache volume as the `app` service so
      # DuckDB blobs written here are readable by Next.js widget handlers.
      - preview_cache_data:/app/data/preview-cache
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

# ============================================================================
# Named Volumes
# ============================================================================
volumes:
  db_data:
    name: rulesage-db-data
  app_node_modules:
    name: rulesage-node-modules
  app_next_cache:
    name: rulesage-next-cache
  preview_cache_data:
    name: rulesage-preview-cache

# ============================================================================
# Network
# ============================================================================
networks:
  app-network:
    driver: bridge
    name: rulesage-network
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
