version: '3'

dotenv: ['.env.local', '.env']

tasks:
  venv:
    desc: local bootstrap backend nextjs and python
    status:
      - test -d .venv
    env:
      UV_PROJECT_ENVIRONMENT: .venv
    cmds:
      - uv venv --clear
      - uv pip install nodeenv
      - nodeenv --node=lts -p
      - uv pip install -r python-backend/requirements.txt
      - npm install

  start:
    desc: Start all services (DB, schema sync, Python backend, Next.js)
    deps: [db:start, venv]
    cmds:
      - task: db:migrate
      - task: start:services

  start:services:
    internal: true
    deps: [python:start, dev]

  stop:
    desc: Stop all services
    cmds:
      - task: db:stop
      - task: python:stop
      - task: dev:stop

  # ── Database ──────────────────────────────────────────────────────────────

  db:migrate:
    desc: Apply Prisma schema to the database
    cmds:
      - npx prisma migrate deploy
      - npx prisma generate

  # ── Python backend ────────────────────────────────────────────────────────

  python:start:
    desc: Start the Python/Flask backend on port 5005
    deps: [venv]
    dir: python-backend
    cmds:
      - python app.py

  python:stop:
    desc: Stop the Python/Flask backend (kills process on port 5005)
    cmds:
      - fuser -k 5005/tcp 2>/dev/null || true
      - echo "Python backend stopped."

  # ── Next.js ───────────────────────────────────────────────────────────────

  dev:
    desc: Start the Next.js dev server on port 9002
    deps: [venv]
    cmds:
      - npm run dev

  dev:stop:
    desc: Stop the Next.js dev server (kills process on port 9002)
    cmds:
      - fuser -k 9002/tcp 2>/dev/null || true
      - echo "Next.js stopped."

  # ── Docker Development ───────────────────────────────────────────────────────

  docker:build:
    desc: Build Docker images for development
    cmds:
      - docker compose build
      - echo "Docker images built successfully."

  docker:start:
    desc: Start all services using Docker Compose (DB, Python, Next.js)
    deps: [db:start]
    cmds:
      - docker compose up -d
      - echo "Waiting for services to be healthy..."
      - |
        until curl -s http://localhost:5005/health > /dev/null 2>&1; do sleep 1; done
        echo "Python backend is ready."
      - |
        until curl -s -o /dev/null -w "%{http_code}" http://localhost:9002 | grep -q "200\|302\|307"; do sleep 2; done
        echo "Next.js is ready."
      - task: docker:prisma:migrate
      - |
        echo "All Docker services started successfully."
        echo "  - Next.js: http://localhost:9002"
        echo "  - Python:  http://localhost:5005"
        echo "  - DB:      localhost:5432"

  docker:stop:
    desc: Stop all Docker services
    cmds:
      - docker compose down
      - echo "Docker services stopped."

  docker:restart:
    desc: Restart all Docker services
    cmds:
      - task: docker:stop
      - task: docker:start

  docker:logs:
    desc: View Docker logs (all services)
    cmds:
      - docker compose logs -f

  docker:logs:app:
    desc: View Next.js Docker logs
    cmds:
      - docker compose logs -f app

  docker:logs:python:
    desc: View Python backend Docker logs
    cmds:
      - docker compose logs -f python-backend

  docker:logs:db:
    desc: View PostgreSQL Docker logs
    cmds:
      - docker compose logs -f db

  docker:shell:app:
    desc: Open shell in Next.js container
    cmds:
      - docker compose exec app sh

  docker:shell:python:
    desc: Open shell in Python container
    cmds:
      - docker compose exec python-backend bash

  docker:shell:db:
    desc: Open PostgreSQL shell
    cmds:
      - docker compose exec db psql -U postgres -d rulesagedb

  docker:prisma:migrate:
    desc: Apply Prisma migrations to Docker database
    cmds:
      - docker compose exec app npx prisma migrate deploy
      - docker compose exec app npx prisma generate
      - docker compose exec app npx tsx scripts/create-admin.ts

  docker:prisma:studio:
    desc: Open Prisma Studio (database GUI)
    cmds:
      - docker compose exec app npx prisma studio

  db:start:
    desc: Start PostgreSQL Docker container
    cmds:
      - |
        if docker ps -a --filter name=^rulesage-db$ --format '.' | grep -q '.'; then
          docker start rulesage-db
        else
          docker compose up -d db
        fi
      - echo "PostgreSQL container ready."

  db:stop:
    desc: Stop PostgreSQL Docker container
    cmds:
      - docker compose stop db
      - echo "PostgreSQL container stopped."

  db:reset:
    desc: Reset Docker database (drop and recreate)
    cmds:
      - docker compose down -v
      - docker compose up -d db app
      - echo "Waiting for PostgreSQL to be ready..."
      - sleep 5
      - task: docker:prisma:migrate
      - task: docker:stop
      - echo "Database reset complete."

  docker:clean:
    desc: Clean up Docker resources (containers, volumes, images)
    cmds:
      - docker compose down -v
      - docker rmi likeaisaid-app likeaisaid-python-backend 2>/dev/null || true
      - echo "Docker resources cleaned."


